<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korea Life RPG — Mission</title>
<link rel="icon" href="logo/favicon.png" type="image/png">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="mission-hud">
  <button id="back-btn" onclick="if(window.Analytics&&!window.missionDone)Analytics.missionAbandon();window.location.href='index.html'">← 메뉴</button>
  <span id="hud-title"></span>
  <a id="about-hud-btn" href="docs/" target="_blank" rel="noopener">About Us</a>
</div>

<!-- Vocabulary screen shown before mission starts -->
<div id="vocab-screen">
  <div id="vocab-panel">
    <div id="vocab-mission-label" class="vocab-eyebrow"></div>
    <h2 class="vocab-heading">오늘의 핵심 단어 · Key Vocabulary</h2>
    <p class="vocab-hint">단어를 클릭하면 영어 뜻이 나옵니다 · Click a word to reveal its meaning</p>
    <div id="vocab-grid"></div>
    <button id="vocab-start-btn">시작하기 · Start Mission →</button>
  </div>
</div>

<div id="game">
  <div id="background"></div>

  <div id="dialogue">
    <div id="text"></div>
    <div id="choices"></div>
    <div id="hint">계속 →</div>
  </div>
</div>

<div id="missionComplete">
  <div class="popup-box">
    <h2>미션 완료</h2>
    <p>성공적으로 완료했습니다</p>
    <p>탭하여 메뉴로 돌아가기 · Tap to return</p>
  </div>
</div>

<button id="chatbot-toggle" title="AI 도우미 · Helper">💬</button>

<div id="chatbot-panel">
  <div id="chatbot-header">
    <span>AI 도우미 · Helper</span>
    <button id="chatbot-close">×</button>
  </div>
  <div id="chatbot-messages"></div>
  <div id="chatbot-input-wrap">
    <input type="text" id="chatbot-input" placeholder="질문을 입력하세요 · Ask anything..." />
    <button id="chatbot-send">보내기</button>
  </div>
</div>

<script src="missions/convstore.js"></script>
<script src="missions/exchange.js"></script>
<script src="missions/lostfound.js"></script>
<script src="missions/immigration.js"></script>
<script src="missions/subway.js"></script>
<script src="missions/bank.js"></script>
<script src="missions/telecom.js"></script>
<script src="missions/clothing.js"></script>
<script src="missions/realestate.js"></script>
<script src="missions/hospital.js"></script>
<script src="missions/pharmacy.js"></script>
<script src="missions/garbage.js"></script>

<script src="js/game.js"></script>
<script src="js/config.public.js"></script>
<script src="js/config.js" onerror="void 0"></script>
<script src="js/chatbot.js"></script>
<script src="js/db.js"></script>
<script src="js/analytics.js"></script>

</body>
</html>
